name: Add Blog Post

on:
  repository_dispatch:
    types: [new-blog-post]
  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      url:
        description: 'Substack post URL'
        required: true
        type: string

jobs:
  add-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Fetch blog post
        run: |
          URL="${{ github.event.client_payload.url || inputs.url }}"
          echo "Fetching: $URL"
          node scripts/fetch-blog-post.js "$URL"

      - name: Update index
        run: node scripts/update-blog-index.js

      - name: Commit new post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/blog/
          if git diff --staged --quiet; then
            echo "No new files to commit (post already exists)"
          else
            TITLE="${{ github.event.client_payload.title || inputs.url }}"
            git commit -m "Add blog post: $TITLE"
            git push
          fi
